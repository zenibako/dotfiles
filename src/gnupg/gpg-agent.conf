# Managed by dotfiles (mac profile) — edit src/gnupg/gpg-agent.conf
default-cache-ttl 600
max-cache-ttl 7200
# Pinentry program. Per-host override via `gpg_pinentry_program` in local.toml.
# Default is the macOS GUI pinentry; headless/SSH-only hosts use pinentry-curses.
pinentry-program {{gpg_pinentry_program}}
