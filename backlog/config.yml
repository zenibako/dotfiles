project_name: "dotfiles"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["Config is deployed using Dotter. If `--force` is required, back up the previous versions.", "Validate results in relevant tool(s). If it's a CLI tool, try in both `zsh` and `nu`."]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nvim"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: true
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
