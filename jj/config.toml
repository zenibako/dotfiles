# Generated by KCL — do not edit manually

# jj config — generated by KCL

[user]
name = "{{name}}"
email = "{{email}}"

[ui]
default_command = [
    "log",
    "--limit",
    "5",
]
diff_editor = ":builtin"
show_cryptographic_signatures = true

[signing]
sign_all = true
backend = "gpg"
key = "{{gpg_key}}"

[merge_tools.diffconflicts]
program = "nvim"
merge_args = [
    "-c",
    "let g:jj_diffconflicts_marker_length=$marker_length",
    "-c",
    "JJDiffConflicts!",
    "$output",
    "$base",
    "$left",
    "$right",
]
merge_tool_edits_conflict_markers = true
