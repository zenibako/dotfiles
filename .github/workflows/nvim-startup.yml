name: Validate Neovim Startup

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  nvim-startup:
    name: Neovim startup (${{ matrix.profile }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [default, personal, work]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Neovim
        run: |
          wget https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          sudo cp -r nvim-linux-x86_64/* /usr/local/
          nvim --version

      - name: Install dotter
        run: |
          wget https://github.com/SuperCuber/dotter/releases/latest/download/dotter-linux-x64-musl -O dotter
          chmod +x dotter
          sudo mv dotter /usr/local/bin/
          dotter --version

      - name: Create deployment directory
        run: |
          DEPLOY_DIR=$(mktemp -d)
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV

      - name: Deploy config with dotter
        run: |
          cat > .dotter/local.toml <<EOF
          packages = ["${{ matrix.profile }}", "linux", "monokai"]

          [variables]
          EOF

          case "${{ matrix.profile }}" in
            work)
              cat >> .dotter/local.toml <<'EOF'
          email = "test@work.example.com"
          username = "test.user"
          apex_lsp_jar_path = "/test/path/apex-jorje-lsp.jar"
          gitlab_personal_access_token = "glpat-test123456789"
          gitlab_api_url = "https://gitlab.example.com/api/v4"
          gitlab_url = "https://gitlab.example.com"
          lsp_salesforce_disabled = false
          mcp_atlassian_enabled = true
          mcp_gitlab_enabled = true
          opencode_build_agent_model = "github-copilot/claude-sonnet-4.5"
          opencode_plan_agent_model = "github-copilot/claude-opus-4.5"
          node_extra_ca_certs = "/test/path/ca-bundle.crt"
          p10k_root_dir = "$HOME/.p10k"
          sonarqube_token = "test_sonar_token_123"
          shell_bin_path = "$HOME/bin"
          EOF
              ;;
            personal)
              cat >> .dotter/local.toml <<'EOF'
          email = "test@personal.example.com"
          github_personal_access_token = "ghp_test123456789"
          home_assistant_url = "https://test.hass.example.com"
          home_assistant_token = "test_token_123"
          playdate_sdk_enabled = true
          mcp_backlog_enabled = true
          opencode_build_agent_model = "anthropic/claude-sonnet-4-5"
          opencode_plan_agent_model = "anthropic/claude-opus-4-5"
          bluesky_app_password = "test_bluesky_password"
          bluesky_handle = "test.bsky.social"
          plex_user_token = "test_plex_user_token"
          plex_server_token = "test_plex_server_token"
          plex_url = "https://test.plex.example.com"
          tmdb_key = "test_tmdb_key"
          youtube_api_key = "test_youtube_api_key"
          google_places_api_key = "test_google_places_key"
          slack_d_cookie = "test_slack_d_cookie"
          slack_token = "xoxp-test-slack-token"
          reddit_session = "test_reddit_session"
          reddit_token_v2 = "test_reddit_token_v2"
          brave_search_api_key = "test_brave_api_key"
          proton_user = "test@proton.me"
          proton_password = "test_proton_password"
          telegram_bot_token = "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
          shell_bin_path = "$HOME/bin"
          EOF
              ;;
            default)
              cat >> .dotter/local.toml <<'EOF'
          email = "test@default.example.com"
          github_personal_access_token = "ghp_test123456789"
          opencode_build_agent_model = "anthropic/claude-sonnet-4-5"
          opencode_plan_agent_model = "anthropic/claude-opus-4-5"
          shell_bin_path = "$HOME/bin"
          EOF
              ;;
          esac

          HOME="$DEPLOY_DIR" dotter deploy --force --verbose

      - name: Install plugins
        run: |
          export HOME="$DEPLOY_DIR"

          # vim.pack.add() clones asynchronously, so we can't use +"qa!".
          # Instead, poll until all git clones finish, then quit.
          timeout 300 nvim --headless -c "lua vim.defer_fn(function()
            local timer = vim.uv.new_timer()
            timer:start(0, 3000, vim.schedule_wrap(function()
              local result = vim.system({'pgrep', '-f', 'git.*clone'}):wait()
              if result.code ~= 0 then
                timer:stop()
                timer:close()
                vim.cmd('qa!')
              end
            end))
          end, 5000)" 2>&1 | tee /tmp/nvim-install.txt || true

          echo "Plugin installation output:"
          cat /tmp/nvim-install.txt

      - name: Test Neovim startup
        run: |
          export HOME="$DEPLOY_DIR"

          # Second run: all plugins already installed, verify clean startup.
          timeout 60 nvim --headless +"qa!" 2>&1 | tee /tmp/nvim-output.txt
          NVIM_EXIT=$?

          echo "Neovim output:"
          cat /tmp/nvim-output.txt

          if [ $NVIM_EXIT -ne 0 ]; then
            echo "::error::Neovim exited with code $NVIM_EXIT"
            exit 1
          fi

          # Check for errors — no filters needed, all errors are genuine
          if grep -E "^E[0-9]+:|Error while calling lua chunk|error loading plugin config" /tmp/nvim-output.txt \
            > /tmp/unexpected-errors.txt 2>/dev/null; then
            if [ -s /tmp/unexpected-errors.txt ]; then
              echo "::error::Unexpected errors during Neovim startup:"
              cat /tmp/unexpected-errors.txt
              exit 1
            fi
          fi

          echo "Neovim started successfully for ${{ matrix.profile }} profile"

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$DEPLOY_DIR" ] && [ -d "$DEPLOY_DIR" ]; then
            rm -rf "$DEPLOY_DIR"
          fi
