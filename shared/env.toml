
# Shared environment variables for zsh and nushell
# This file is the single source of truth for environment variables
# that should be consistent across shells.
#
# Usage:
#   - nushell: parsed natively with `open`
#   - zsh: parsed with a helper function
#
# Note: Use $HOME for home directory references (will be expanded by shells)

[env]
EDITOR = "nvim"
XDG_CONFIG_HOME = "$HOME/.config"
VENV_HOME = "$HOME/.virtualenvs"
NVM_DIR = "$HOME/.nvm"

# pnpm
PNPM_HOME = "$HOME/Library/pnpm"

# Salesforce CLI
SF_USE_GENERIC_UNIX_KEYCHAIN = "true"
SF_BETA_TRACK_FILE_MOVES = "true"

# Lua paths (luarocks 5.5)
LUA_PATH = "/opt/homebrew/Cellar/luarocks/3.13.0_1/share/lua/5.5/?.lua;/opt/homebrew/Cellar/luarocks/3.12.2/share/lua/5.5/?.lua;/opt/homebrew/share/lua/5.5/?.lua;/opt/homebrew/share/lua/5.5/?/init.lua;/opt/homebrew/lib/lua/5.5/?.lua;/opt/homebrew/lib/lua/5.5/?/init.lua;./?.lua;./?/init.lua;$HOME/.luarocks/share/lua/5.5/?.lua;$HOME/.luarocks/share/lua/5.5/?/init.lua"
LUA_CPATH = "/opt/homebrew/lib/lua/5.5/?.so;/opt/homebrew/lib/lua/5.5/loadall.so;./?.so;$HOME/.luarocks/lib/lua/5.5/?.so"

# NOTE: Sensitive credentials (tokens, API keys, passwords) are loaded via
# Proton Pass CLI at shell startup rather than stored in this file.
# See: ~/.config/opencode/script/proton-pass-env.sh
#
# Only non-sensitive environment variables (URLs, handles, paths) remain here.

{{#if opencode_profile_work}}
# GitLab configuration (work profile)
GITLAB_URL = "{{gitlab_url}}"
# NOTE: work credentials are injected from Proton Pass during dotter deploy.
# They appear here because external CLI tools (glab, gh, nvim plugins) require
# them as environment variables.
GITLAB_TOKEN = ""
SONAR_TOKEN = ""
SLACK_TOKEN = ""
SLACK_D_COOKIE = ""

# Netskope CA certificates (work profile)
NODE_EXTRA_CA_CERTS = "{{node_extra_ca_certs}}"
REQUESTS_CA_BUNDLE = "{{node_extra_ca_certs}}"

# Powerlevel10k (work profile)
P10K_ROOT_DIR = "{{p10k_root_dir}}"
{{/if}}

{{#if opencode_profile_personal}}
# Home Assistant
HA_URL = "{{home_assistant_url}}"

# Bluesky
{{#if bluesky_handle}}BSKY_HANDLE = "{{bluesky_handle}}"
{{/if}}
# Plex
PLEX_URL = "{{plex_url}}"

# Proton Mail Bridge username
{{#if proton_user}}PROTON_USER = "{{proton_user}}"
{{/if}}
{{/if}}

{{#if tripit_username}}TRIPIT_USERNAME = "{{tripit_username}}"
{{/if}}

[path]
# Paths to append (order matters, first = highest priority when prepended)
prepend = [
    "{{shell_bin_path}}",
    "$HOME/.luarocks/bin",
    "$HOME/.cargo/bin",
    "$HOME/Library/pnpm/bin",
    "/opt/python27/bin",
    "$HOME/.local/bin",
]

append = [
    "$HOME/go/bin",
    "$HOME/bin",
    "$HOME/.atuin/bin",
    "/usr/local/bin",
    "/Applications/Obsidian.app/Contents/MacOS",
]

