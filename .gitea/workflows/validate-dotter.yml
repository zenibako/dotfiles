name: Validate

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  validate:
    name: ${{ matrix.profile }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [default, personal, work]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Neovim
        if: runner.os == 'Linux'
        run: |
          wget https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          sudo cp -r nvim-linux-x86_64/* /usr/local/
          nvim --version

      - name: Install dotter
        run: scripts/dotter-ci/install-dotter.sh

      - name: Create deployment directory
        run: |
          DEPLOY_DIR=$(mktemp -d)
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV

      - name: Deploy config with dotter
        run: scripts/dotter-ci/create-local-toml.sh "${{ matrix.profile }}" monokai .dotter/local.toml

      - name: Run dotter deploy
        run: |
          echo "Generated local.toml:"
          cat .dotter/local.toml
          HOME="$DEPLOY_DIR" dotter deploy --force --verbose --noconfirm

      - name: Verify deployment
        run: |
          echo "Verifying files were deployed to $DEPLOY_DIR"
          ls -la "$DEPLOY_DIR" || true
          find "$DEPLOY_DIR" -type f | head -20 || true

      - name: Install tree-sitter CLI
        if: runner.os == 'Linux'
        run: npm install -g tree-sitter-cli

      - name: Install plugins
        if: runner.os == 'Linux'
        run: scripts/dotter-ci/install-nvim-plugins.sh "$DEPLOY_DIR"

      - name: Test Apex tree-sitter parser compiles
        if: runner.os == 'Linux'
        run: scripts/dotter-ci/test-apex-parser.sh

      - name: Test Neovim startup
        if: runner.os == 'Linux'
        run: scripts/dotter-ci/test-nvim-startup.sh "$DEPLOY_DIR"

      - name: Cleanup
        if: always()
        run: scripts/dotter-ci/cleanup.sh "$DEPLOY_DIR"

  validate-themes:
    name: Theme ${{ matrix.theme }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        theme: [nightowl, tokyonight]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate themes
        run: scripts/dotter-ci/validate-themes.sh "${{ matrix.theme }}"

  validate-syntax:
    name: Validate Configuration Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TOML validator
        run: pip install --break-system-packages toml

      - name: Validate TOML files
        run: scripts/dotter-ci/validate-toml.sh

      - name: Install dotter
        run: scripts/dotter-ci/install-dotter.sh

      - name: Test global.toml for duplicate variables
        run: |
          echo "Testing each profile without variable overrides to catch conflicts in global.toml"

          for profile in default personal work; do
            echo "Testing $profile profile..."
            scripts/dotter-ci/create-local-toml.sh --force "$profile" monokai .dotter/local.toml

            if ! dotter deploy --dry-run --force 2>&1 | tee /tmp/dotter-$profile.log; then
              echo "✗ Failed to deploy $profile profile"
              cat /tmp/dotter-$profile.log
              exit 1
            fi
            echo "✓ $profile profile deploys successfully"
          done

      - name: Deploy with dotter (for Lua validation)
        run: |
          scripts/dotter-ci/create-local-toml.sh --force default monokai .dotter/local.toml
          dotter deploy --force --verbose --noconfirm

      - name: Validate Lua files
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          scripts/dotter-ci/validate-lua.sh "$HOME/.config/nvim"
